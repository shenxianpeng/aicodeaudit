name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (@$AUTHOR)"
template: |
  ## Changes

  $CHANGES

categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Fixes
    labels:
      - fix
      - bug
      - bugfix
  - title: Documentation
    labels:
      - documentation
      - docs
  - title: Maintenance
    labels:
      - chore
      - ci
      - dependencies

exclude-labels:
  - skip-changelog

version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - fix
      - bug
      - bugfix
      - chore
      - ci
      - documentation
      - docs
      - dependencies
  default: patch

autolabeler:
  - label: documentation
    files:
      - "*.md"
      - "docs/**"
  - label: ci
    files:
      - ".github/**"
